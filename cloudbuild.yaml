### A build trigger set up in the Google lage-genoppi project will
### initiate Cloud Build using this file (manual invocation)

steps:
    
# (1) build docker image using Dockerfile
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'build',
    '-t',
    '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${_IMAGE_TAG}', 
    '.'
  ]

# (2) push docker image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'push', 
    '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${_IMAGE_TAG}'
  ]

# define image to be pushed
images:
- '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${_IMAGE_TAG}'

# use substitutions for flexibility
substitutions:
  _LOCATION: us-central1
  _REPOSITORY: genoppi
  _IMAGE_NAME: magma
  _IMAGE_TAG: 2026.05.11

